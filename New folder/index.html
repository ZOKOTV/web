<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="icon.png">
<title>Trang Chủ</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
  font-family: 'Orbitron', Arial, sans-serif;
  background: linear-gradient(135deg, #0b0b0b, #1c1c1c);
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 20px;
}

/* Logo */
@keyframes pulse {
  0%,100% { box-shadow: 0 0 15px #fff; }
  50% { box-shadow: 0 0 25px #fff, 0 0 40px #ccc; }
}
.logo {
  width: 120px;
  height: 120px;
  margin: 20px auto;
  border-radius: 50%;
  background: url('icon.png') no-repeat center center;
  background-size: cover;
  box-shadow: 0 0 15px #fff;
  transition: box-shadow 0.3s, transform 0.3s;
  animation: pulse 3s infinite ease-in-out;
}
.logo:hover {
  box-shadow: 0 0 30px #fff, 0 0 60px #ccc;
  transform: scale(1.1);
}

/* Header */
h1 { 
  margin-top: 10px; 
  font-size: 2.5em; 
  color: #fff; 
  text-shadow: 0 0 12px #fff; 
}

/* Menu */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 20px;
  margin-top: 30px;
}

/* Card */
.card {
  background: #111;
  border-radius: 12px;
  box-shadow: 0 0 12px #444;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  transition: all 0.3s;
  border: 2px solid #444;
  cursor: pointer;
}
.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 0 25px #fff, 0 0 40px #ccc;
  border-color: #fff;
}
.card:active {
  transform: scale(0.98);
  box-shadow: 0 0 15px #ccc;
}

/* File name */
.filename {
  font-weight: bold;
  font-size: 16px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 10px;
  text-shadow: 0 0 6px #ccc;
}
.filename i {
  font-size: 18px;
  color: #fff;
}

/* Download button */
.download-btn {
  display: inline-block;
  padding: 12px 15px;
  background-color: #111;
  color: #fff;
  border: 2px solid #fff;
  border-radius: 8px;
  font-weight: bold;
  text-decoration: none;
  font-size: 14px;
  box-shadow: 0 0 8px #fff;
  transition: all 0.3s ease;
}
.download-btn:hover {
  background-color: #fff;
  color: #000;
  box-shadow: 0 0 20px #fff, 0 0 40px #ccc;
  transform: scale(1.05);
}

/* Back button */
.back-btn-container { text-align: center; margin: 30px 0; }
.back-btn {
  display: inline-block;
  padding: 12px 25px;
  background-color: #111;
  color: #fff;
  border: 2px solid #fff;
  border-radius: 8px;
  font-weight: bold;
  text-decoration: none;
  transition: all 0.3s ease;
}
.back-btn:hover {
  background-color: #fff;
  color: #000;
  box-shadow: 0 0 20px #fff, 0 0 40px #ccc;
  transform: scale(1.05);
}

/* Footer */
.footer { 
  margin-top: 40px; 
  font-size: 0.9em; 
  color: #aaa; 
  text-align: center;
}
.footer .social-links a { 
  color: #fff; 
  margin: 0 10px; 
  text-decoration: none; 
  font-size: 1.2em;
  transition: all 0.3s ease; 
}
.footer .social-links a:hover { 
  color: #00ffff;  
  text-shadow: 0 0 8px #00ffff, 0 0 16px #00ffff;
}
.footer p {
  margin-top: 8px;
  color: #aaa;
}

/* Link button (copy style) */
.link-btn {
  color: #fff;
  margin: 0 10px;
  text-decoration: none;
  font-size: 1.2em;
  transition: all 0.3s ease;
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
}
.link-btn:hover {
  color: #00ffff;
  text-shadow: 0 0 8px #00ffff, 0 0 16px #00ffff;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(0);
  background-color: #fff;
  color: #000;
  padding: 10px 20px;
  border-radius: 8px;
  box-shadow: 0 0 10px #fff;
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  z-index: 9999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

/* Responsive */
@media(max-width:600px){
  h1 { font-size: 1.8em; }
  .card { padding: 14px; }
  .download-btn { width: 100%; padding: 12px; }
  .menu { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="logo"></div>
<h1>Chọn thứ bạn cần</h1>

<div class="menu">
  <div class="card" onclick="window.location.href='t6.html'">Locket_Gold Android</div>
  <div class="card" onclick="window.location.href='t3.html'">Mc Java</div>
  <div class="card" onclick="window.location.href='t4.html'">Schematic</div>
  <div class="card" onclick="window.location.href='t1.html'">Mc Bedrock</div>
  <div class="card" onclick="window.location.href='t2.html'">Free Fire Pc</div>
  <div class="card" onclick="window.location.href='t5.html'">Private</div>
</div>

<div class="footer">
  <div class="social-links">
    <a href="https://www.tiktok.com/@trandoii" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a>
    <a href="https://www.youtube.com/@zokotvcn" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
    <a href="https://www.facebook.com/doi.tran.510812/?locale=vi_VN" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
    <!-- Email: copy trực tiếp, không chuyển trang -->
    <a class="link-btn" onclick="copyText('trandoi459@gmail.com', '✅ Đã sao chép Email!')">
      <i class="fas fa-envelope"></i> Email
    </a>
  </div>
  <p>© 2025 - Cre: Tran Van Doi</p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
function copyText(text, message) {
  navigator.clipboard.writeText(text)
    .then(() => showToast(message || "✅ Đã sao chép!"))
    .catch(() => showToast("❌ Không thể sao chép!"));
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
</script>

</body>
</html>
